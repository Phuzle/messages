services:
  phuzle-messages-server:
    build: .
    container_name: phuzle-messages-server
    restart: unless-stopped
    ports:
      # Bound to 0.0.0.0 on the host so it's reachable both from the Android emulator
      # (http://10.0.2.2:8080) and from a real device on the same wifi network
      # (http://<this-machine's-LAN-IP>:8080).
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/keywords.sqlite
    volumes:
      # Keyword/trigger-phrase edits made through the API (see README) are written to this sqlite
      # file — mount it from the host so `docker compose up --build` doesn't reset the dataset
      # back to defaults every time the image is rebuilt.
      - ./data:/app/data
