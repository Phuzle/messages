name: Release

# Fires when a GitHub Release is published (whether the tag is new or already existed).
# workflow_dispatch is a manual fallback to (re)build and re-attach the APK to an existing
# release without needing to delete and republish it (e.g. if the first upload failed).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach the APK to"
        required: true

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "name=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      # The app's versionName mirrors the release tag (minus its leading "v"), e.g. tag v1.0.3-beta
      # -> versionName 1.0.3-beta. versionCode must be a strictly increasing integer, which a
      # semver-with-suffix string can't cleanly provide, so it uses this workflow's own run number
      # instead — monotonic for the lifetime of this workflow file, no parsing required.
      - name: Derive app version from tag
        id: version
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/release.keystore"

      - name: Build signed release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreleaseVersionCode=${{ steps.version.outputs.code }} \
            -PreleaseVersionName=${{ steps.version.outputs.name }} \
            --no-daemon

      - name: Rename APK for the release asset
        run: |
          mkdir -p release-assets
          cp app/build/outputs/apk/release/app-release.apk "release-assets/Messages-${{ steps.tag.outputs.name }}.apk"

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: release-assets/*.apk
